

services:
  # Servicio 1: Nuestra Base de Datos
  db:
    image: postgres:15-alpine
    container_name: portal_assa_db
    restart: always
    environment:
      POSTGRES_USER: assa_admin
      POSTGRES_PASSWORD: password_seguro_123
      POSTGRES_DB: portal_assa
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Servicio 2: Interfaz visual para ver nuestra BD (Opcional pero recomendado)
  adminer:
    image: adminer
    container_name: portal_assa_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  api:
    build: ./backend
    container_name: portal_assa_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ediprocessing:/app/ediprocessing
    depends_on:
      - db

  #La interfaz visual
  frontend:
    build: ./frontend
    container_name: portal_assa_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evita conflictos entre tu Ubuntu y el contenedor
    depends_on:
      - api
    
  oftp2-engine:
    # Cambiamos openjdk por el estándar actual de Eclipse Temurin
    image: eclipse-temurin:11-jre-focal
    container_name: portal_assa_oftp2
    restart: unless-stopped
    ports:
      - "3305:3305" 
      - "8088:8088" 
    volumes:
      - ./ediprocessing:/app/ediprocessing
      - ./mendelson_config:/app/config 
    command: tail -f /dev/null

# Declaración de persistencia
volumes:
  pgdata: